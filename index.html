<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>战斗掉落扇环落点 Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="side-panel" aria-label="掉落参数面板">
        <div class="panel-header">
          <h1>掉落落点扇环 Demo</h1>
          <p>怪物死亡后，道具在玩家到怪物方向的背向侧扇环内随机。</p>
        </div>

        <section class="panel-section" aria-labelledby="position-title">
          <h2 id="position-title">位置</h2>
          <div class="control-grid compact">
            <label for="playerX">playerX</label>
            <input id="playerX" type="number" step="1" />

            <label for="playerY">playerY</label>
            <input id="playerY" type="number" step="1" />

            <label for="monsterX">monsterX</label>
            <input id="monsterX" type="number" step="1" />

            <label for="monsterY">monsterY</label>
            <input id="monsterY" type="number" step="1" />
          </div>
        </section>

        <section class="panel-section" aria-labelledby="shape-title">
          <h2 id="shape-title">怪物与扇环</h2>

          <div class="control-line">
            <label for="monsterRadius">monsterRadius</label>
            <div class="number-range">
              <input id="monsterRadius" type="number" min="0" max="180" step="1" />
              <input id="monsterRadiusRange" type="range" min="0" max="180" step="1" />
            </div>
          </div>

          <div class="control-line">
            <label for="dropAngle">dropAngle</label>
            <div class="number-range">
              <input id="dropAngle" type="number" min="1" max="360" step="1" />
              <input id="dropAngleRange" type="range" min="1" max="360" step="1" />
            </div>
          </div>

          <div class="control-line">
            <label for="dropInnerRadius">dropInnerRadius</label>
            <div class="number-range">
              <input id="dropInnerRadius" type="number" min="0" max="360" step="1" />
              <input id="dropInnerRadiusRange" type="range" min="0" max="360" step="1" />
            </div>
          </div>

          <div class="control-line">
            <label for="dropOuterRadius">dropOuterRadius</label>
            <div class="number-range">
              <input id="dropOuterRadius" type="number" min="0" max="420" step="1" />
              <input id="dropOuterRadiusRange" type="range" min="0" max="420" step="1" />
            </div>
          </div>

          <div class="control-line">
            <label for="sampleCount">sampleCount</label>
            <div class="number-range">
              <input id="sampleCount" type="number" min="1" max="1000" step="1" />
              <input id="sampleCountRange" type="range" min="1" max="1000" step="1" />
            </div>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="actions-title">
          <h2 id="actions-title">操作</h2>
          <div class="button-grid">
            <button id="generateOne" type="button">生成 1 个落点</button>
            <button id="generateMany" type="button">生成 sampleCount 个落点</button>
            <button id="clearSamples" type="button">清空落点</button>
            <button id="resetDefaults" type="button">重置默认值</button>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="result-title">
          <h2 id="result-title">当前计算结果</h2>
          <dl class="result-list">
            <div>
              <dt>baseAngle</dt>
              <dd id="baseAngleValue">0.00°</dd>
            </div>
            <div>
              <dt>dropAngle</dt>
              <dd id="dropAngleValue">180°</dd>
            </div>
            <div>
              <dt>dropInnerRadius</dt>
              <dd id="dropInnerRadiusValue">70</dd>
            </div>
            <div>
              <dt>dropOuterRadius</dt>
              <dd id="dropOuterRadiusValue">180</dd>
            </div>
            <div>
              <dt>最近一次落点</dt>
              <dd id="lastDropValue">-</dd>
            </div>
          </dl>
          <div id="warnings" class="warnings" role="status" aria-live="polite"></div>
        </section>
      </aside>

      <section class="canvas-panel" aria-label="掉落几何可视化">
        <div class="canvas-toolbar">
          <div class="legend">
            <span><i class="legend-dot player"></i>角色</span>
            <span><i class="legend-dot monster"></i>怪物</span>
            <span><i class="legend-dot sector"></i>可随机区域</span>
            <span><i class="legend-dot drop"></i>烧鸡 / 鸡腿</span>
          </div>
          <span id="sampleCountBadge" class="sample-badge">0 个落点</span>
        </div>
        <div class="canvas-frame">
          <canvas id="dropCanvas" width="900" height="620" aria-label="掉落扇环区域画布"></canvas>
        </div>
      </section>
    </main>

    <script src="src/dropMath.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
